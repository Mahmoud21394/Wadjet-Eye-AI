# ══════════════════════════════════════════════════════════════════
#  Wadjet-Eye AI — NGINX API Gateway (Phase 2)
#  infra/nginx/nginx.conf
#
#  Roles:
#  • TLS termination
#  • API Gateway routing to microservices
#  • Rate limiting (zone-based, burst with nodelay)
#  • JWT validation passthrough headers
#  • Upstream load balancing
#  • WebSocket proxy for Socket.IO
#  • Security headers (CSP, HSTS, X-Frame-Options, etc.)
# ══════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging format ──────────────────────────────────────────
    log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"uri":"$uri",'
          '"status":$status,'
          '"bytes_sent":$bytes_sent,'
          '"request_time":$request_time,'
          '"upstream_response_time":"$upstream_response_time",'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"request_id":"$request_id"'
        '}';

    access_log  /var/log/nginx/access.log json_combined;

    # ── Performance ─────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75;
    keepalive_requests  1000;
    client_max_body_size 10m;

    # ── Gzip compression ────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript text/xml
                      application/xml application/xml+rss text/javascript;
    gzip_min_length   1000;

    # ── Rate limiting zones ─────────────────────────────────────
    # Global API zone: 100 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=api_global:20m   rate=100r/m;
    # Auth endpoints: 10 req/15min per IP  (strict anti-brute-force)
    limit_req_zone  $binary_remote_addr  zone=auth:10m         rate=10r/m;
    # LLM/AI endpoints: 20 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=llm:10m          rate=20r/m;
    # WebSocket connections
    limit_conn_zone $binary_remote_addr  zone=ws_conn:10m;

    limit_req_status  429;
    limit_conn_status 429;

    # ── Request ID generation ────────────────────────────────────
    map $http_x_request_id $req_id {
        default   $http_x_request_id;
        ""        $request_id;
    }

    # ── Upstream: API Backend ────────────────────────────────────
    upstream wadjet_api {
        least_conn;
        server  backend:4000  max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Upstream: RAG Service ────────────────────────────────────
    upstream wadjet_rag {
        server  rag-service:5001  max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ── Upstream: Reporting Service ─────────────────────────────
    upstream wadjet_reports {
        server  report-service:5002  max_fails=3 fail_timeout=30s;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name ${NGINX_SERVER_NAME:-api.wadjet-eye.io};

        # ── TLS ──────────────────────────────────────────────────
        ssl_certificate      /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key  /etc/nginx/certs/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:50m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;
        ssl_stapling         on;
        ssl_stapling_verify  on;

        # ── Security headers ─────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                always;
        add_header X-Frame-Options           "DENY"                   always;
        add_header X-XSS-Protection          "1; mode=block"          always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header X-Request-ID              $req_id                  always;

        # Remove server identification headers
        server_tokens off;
        more_clear_headers Server;

        # ── Health check (unauthenticated) ───────────────────────
        location = /health {
            proxy_pass       http://wadjet_api/health;
            proxy_set_header Host $host;
            access_log       off;
        }

        # ── Auth endpoints (strict rate limit) ───────────────────
        location ~ ^/api/auth/(login|register|refresh|mfa) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_log_level warn;

            proxy_pass        http://wadjet_api;
            include           /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── LLM / AI endpoints (strict rate limit) ───────────────
        location ~ ^/api/(ai|rakay|llm|copilot) {
            limit_req zone=llm burst=10 nodelay;
            limit_req_log_level warn;

            proxy_pass            http://wadjet_api;
            include               /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
        }

        # ── RAG pipeline endpoints ───────────────────────────────
        location /api/rag/ {
            limit_req zone=llm burst=5 nodelay;

            proxy_pass        http://wadjet_rag/;
            include           /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout 120s;
        }

        # ── Reports (PDF generation — long timeout) ──────────────
        location /api/reports/ {
            limit_req zone=api_global burst=10 nodelay;

            proxy_pass         http://wadjet_reports/;
            include            /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── WebSocket (Socket.IO) ────────────────────────────────
        location /socket.io/ {
            limit_conn ws_conn 10;

            proxy_pass          http://wadjet_api;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── All other API routes ─────────────────────────────────
        location /api/ {
            limit_req zone=api_global burst=50 nodelay;

            proxy_pass       http://wadjet_api;
            include          /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── 404 for unknown routes ───────────────────────────────
        location / {
            return 404 '{"error":"Not Found","code":"ROUTE_NOT_FOUND"}';
            add_header Content-Type application/json always;
        }
    }
}
