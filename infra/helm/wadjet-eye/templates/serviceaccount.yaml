{{- /*
  Wadjet-Eye AI — Helm ServiceAccount + RBAC
  infra/helm/wadjet-eye/templates/serviceaccount.yaml
*/ -}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wadjet-eye.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wadjet-eye.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default false }}
{{- end }}
