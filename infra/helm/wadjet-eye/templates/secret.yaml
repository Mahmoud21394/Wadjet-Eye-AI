# ══════════════════════════════════════════════════════════════════
#  Wadjet-Eye AI — Helm Secrets Template
#  infra/helm/wadjet-eye/templates/secret.yaml
#
#  NOTE: In production, use Vault Agent Injector or External Secrets
#  Operator instead of committing plaintext secrets to Helm values.
#  This template is for bootstrap / CI-only use.
# ══════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: wadjet-eye-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wadjet-eye.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  JWT_SECRET:             "{{ .Values.secrets.jwtSecret              | default "CHANGE_ME_IN_PRODUCTION_32_CHAR_MIN" }}"
  SUPABASE_URL:           "{{ .Values.secrets.supabaseUrl            | default "" }}"
  SUPABASE_SERVICE_KEY:   "{{ .Values.secrets.supabaseServiceKey     | default "" }}"
  SUPABASE_ANON_KEY:      "{{ .Values.secrets.supabaseAnonKey        | default "" }}"
  OPENAI_API_KEY:         "{{ .Values.secrets.openaiApiKey           | default "" }}"
  CLAUDE_API_KEY:         "{{ .Values.secrets.claudeApiKey           | default "" }}"
  PINECONE_API_KEY:       "{{ .Values.secrets.pineconeApiKey         | default "" }}"
  PINECONE_HOST:          "{{ .Values.secrets.pineconeHost           | default "" }}"
  NEO4J_PASSWORD:         "{{ .Values.secrets.neo4jPassword          | default "neo4j_CHANGE_ME" }}"
  VAULT_ROLE_ID:          "{{ .Values.secrets.vaultRoleId            | default "" }}"
  VAULT_SECRET_ID:        "{{ .Values.secrets.vaultSecretId          | default "" }}"
  REDIS_PASSWORD:         "{{ .Values.secrets.redisPassword          | default "" }}"
  SPLUNK_HEC_TOKEN:       "{{ .Values.secrets.splunkHecToken         | default "" }}"
  SENTINEL_CLIENT_SECRET: "{{ .Values.secrets.sentinelClientSecret   | default "" }}"
  XSOAR_API_KEY:          "{{ .Values.secrets.xsoarApiKey            | default "" }}"
  OTX_API_KEY:            "{{ .Values.secrets.otxApiKey              | default "" }}"
  VIRUSTOTAL_API_KEY:     "{{ .Values.secrets.virusTotalApiKey       | default "" }}"
  ABUSEIPDB_API_KEY:      "{{ .Values.secrets.abuseIpDbApiKey        | default "" }}"
  MFA_ENCRYPTION_KEY:     "{{ .Values.secrets.mfaEncryptionKey       | default "" }}"
  GDELT_API_KEY:          "{{ .Values.secrets.gdeltApiKey            | default "" }}"
  TAXII_API_KEY:          "{{ .Values.secrets.taxiiApiKey            | default "" }}"
---
# ── TLS Certificate Secret (populated by cert-manager in production) ──
apiVersion: v1
kind: Secret
metadata:
  name: wadjet-eye-tls
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wadjet-eye.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/issuer: "letsencrypt-prod"
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
