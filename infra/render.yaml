###############################################################
#  Wadjet-Eye AI — Render Infrastructure Definition
#  infra/render.yaml
#
#  Services:
#    api    — Express backend (Render Web Service)
#    worker — Background job worker (Render Background Worker)
#
#  Environment variables with sensitive values MUST be set in
#  Render Dashboard → Environment → Add Environment Variable.
#  Do NOT commit actual values here.
###############################################################

services:
  # ── API (Web Service) ──────────────────────────────────────────
  - type: web
    name: wadjet-eye-api
    runtime: node
    region: oregon
    plan: starter   # upgrade to standard for production
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    numInstances: 1
    autoDeploy: true

    envVars:
      # ── Runtime ───────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

      # ── Frontend URL (CORS) ───────────────────────────────────
      - key: FRONTEND_URL
        value: https://wadjet-eye-ai.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://wadjet-eye-ai.vercel.app,https://www.genspark.ai

      # ── Supabase (set in Render Dashboard — never commit) ─────
      - key: SUPABASE_URL
        sync: false   # manually set in dashboard
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # ── Auth (set in Render Dashboard) ───────────────────────
      - key: JWT_SECRET
        sync: false
      - key: ACCESS_TOKEN_TTL
        value: 900
      - key: REFRESH_TOKEN_EXPIRY_DAYS
        value: 30

      # ── AI Providers (set in Render Dashboard) ────────────────
      # At least one of these must be set for AI to work:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CLAUDE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: DEEPSEEK_API_KEY
        sync: false

      # ── Threat Intel APIs (set in Render Dashboard) ───────────
      - key: OTX_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false

      # ── Quota (optional) ─────────────────────────────────────
      - key: TENANT_DAILY_AI_QUOTA
        value: 1000

  # ── Worker (Background Worker) ─────────────────────────────────
  # Uncomment when apps/worker is ready:
  # - type: worker
  #   name: wadjet-eye-worker
  #   runtime: node
  #   region: oregon
  #   plan: starter
  #   rootDir: apps/worker
  #   buildCommand: npm ci --omit=dev
  #   startCommand: node src/index.js
  #   envVars:
  #     - fromGroup: wadjet-eye-shared-env
