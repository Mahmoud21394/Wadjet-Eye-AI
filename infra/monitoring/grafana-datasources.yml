# ══════════════════════════════════════════════════════════════════
#  Wadjet-Eye AI — Grafana Datasource Provisioning
#  infra/monitoring/grafana-datasources.yml
# ══════════════════════════════════════════════════════════════════
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      scrapeInterval: "15s"
      queryTimeout: "60s"
    version: 1
    editable: false
