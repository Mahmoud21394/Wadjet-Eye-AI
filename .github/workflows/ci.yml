name: ThreatPilot AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ════════════════════════════════════════════════════════
  #  JOB 1: Lint & Validate
  # ════════════════════════════════════════════════════════
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run ESLint
        working-directory: backend
        run: npm run lint
        continue-on-error: false

      - name: Validate package.json
        working-directory: backend
        run: node -e "
          const pkg = require('./package.json');
          const required = ['name','version','main','scripts'];
          const missing = required.filter(k => !pkg[k]);
          if (missing.length) { console.error('Missing package.json fields:', missing); process.exit(1); }
          console.log('package.json validation: OK');
        "

  # ════════════════════════════════════════════════════════
  #  JOB 2: Unit Tests
  # ════════════════════════════════════════════════════════
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      NODE_ENV:             test
      SUPABASE_URL:         https://placeholder.supabase.co
      SUPABASE_ANON_KEY:    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      PORT:                 4001
      ALLOWED_ORIGINS:      http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install all dependencies (including dev)
        working-directory: backend
        run: npm install

      - name: Run unit tests with coverage
        working-directory: backend
        run: npm test -- --passWithNoTests

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ════════════════════════════════════════════════════════
  #  JOB 3: Security Audit
  # ════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Audit npm dependencies
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for hardcoded secrets (basic)
        run: |
          echo "Scanning for potential secrets in code..."
          if grep -rn "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\." \
             --include="*.js" --include="*.ts" --include="*.json" \
             --exclude-dir=node_modules \
             --exclude-dir=.git \
             . 2>/dev/null | grep -v ".env.example" | grep -v "placeholder"; then
            echo "⚠️  WARNING: Possible hardcoded JWT tokens found in source files!"
          else
            echo "✅ No hardcoded secrets detected in source files"
          fi

  # ════════════════════════════════════════════════════════
  #  JOB 4: Build Validation (Production dry-run)
  # ════════════════════════════════════════════════════════
  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [lint, test]

    env:
      NODE_ENV:             production
      SUPABASE_URL:         https://placeholder.supabase.co
      SUPABASE_ANON_KEY:    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      PORT:                 4002
      ALLOWED_ORIGINS:      http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production dependencies only
        working-directory: backend
        run: npm install --omit=dev

      - name: Verify server starts correctly
        working-directory: backend
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 5
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ Server started successfully (PID: $SERVER_PID)"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4002/health || echo "000")
            echo "Health check HTTP status: $HTTP_STATUS"
            kill $SERVER_PID
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed"
            else
              echo "⚠️  Health check returned non-200 (DB not connected in CI — expected)"
            fi
          else
            echo "❌ Server crashed on startup"
            exit 1
          fi

  # ════════════════════════════════════════════════════════
  #  JOB 5: Deploy to Render (main branch only)
  # ════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "✅ Render deployment triggered successfully"
          else
            echo "⚠️  Render deploy hook returned: $HTTP_STATUS"
          fi

      - name: Deployment Summary
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  ThreatPilot AI — Deployment Summary"
          echo "═══════════════════════════════════════════════════"
          echo "  Branch:   ${{ github.ref_name }}"
          echo "  Commit:   ${{ github.sha }}"
          echo "  Time:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "═══════════════════════════════════════════════════"
