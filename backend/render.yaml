# ══════════════════════════════════════════════════════════
#  ThreatPilot AI — Render.com Deployment Configuration
#  https://render.com/docs/render-yaml
#
#  HOW TO USE:
#  1. Push this file to the root of your GitHub repo
#  2. Connect the repo to Render.com via "New → Blueprint"
#  3. Render reads render.yaml and auto-creates all services
#  4. Set secrets in Render Dashboard → Environment → Secret Files
# ══════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────
  #  BACKEND — Node.js / Express API
  # ─────────────────────────────────────────────────────────
  - type: web
    name: threatpilot-api
    runtime: node
    region: oregon          # Choose: oregon | frankfurt | singapore | ohio
    plan: free              # free | starter ($7/mo) | standard ($25/mo)

    # ── Build ──────────────────────────────────────────────
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: npm start

    # ── Health Check ───────────────────────────────────────
    # Render pings this URL every 30s; restarts if it fails 3× in a row
    healthCheckPath: /health

    # ── Auto-Deploy ────────────────────────────────────────
    autoDeploy: true          # Redeploy automatically on git push

    # ── Environment Variables ──────────────────────────────
    # Non-secret values defined here; secrets set in Render Dashboard
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4000

      # Set this AFTER the frontend is deployed on Vercel/Netlify
      # Format: comma-separated list of allowed frontend origins (no trailing slashes)
      - key: ALLOWED_ORIGINS
        value: https://wadjet-eye-ai.vercel.app,https://wadjet-ai.vercel.app,https://www.genspark.ai,http://localhost:3000,http://localhost:5500

      - key: FRONTEND_URL
        value: https://wadjet-eye-ai.vercel.app

      # ── Supabase secrets — set in Render Dashboard, NOT here ──
      # Dashboard → Service → Environment → Add Secret
      - key: SUPABASE_URL
        sync: false          # sync:false = Render prompts you to enter this manually

      - key: SUPABASE_ANON_KEY
        sync: false

      - key: SUPABASE_SERVICE_KEY
        sync: false

      # ── Threat Intel API Keys — set in Render Dashboard ──
      - key: VIRUSTOTAL_API_KEY
        sync: false

      - key: ABUSEIPDB_API_KEY
        sync: false

      - key: SHODAN_API_KEY
        sync: false

      - key: OTX_API_KEY
        sync: false

      # ── Optional ──
      - key: GREYNOISE_API_KEY
        sync: false

      - key: THREATFOX_API_KEY
        sync: false

      - key: URLSCAN_API_KEY
        sync: false

      # ── CTI Scheduler intervals (minutes) ──
      - key: OTX_INTERVAL_MIN
        value: "60"

      - key: ABUSE_INTERVAL_MIN
        value: "120"

      - key: URLHAUS_INTERVAL_MIN
        value: "30"

      - key: NVD_INTERVAL_MIN
        value: "360"

      - key: SOAR_INTERVAL_MIN
        value: "5"

      # ── Default tenant for ingestion (MSSP Global) ──
      - key: DEFAULT_TENANT_ID
        value: "00000000-0000-0000-0000-000000000001"

      # ── Set to 'true' to disable background scheduler (debug only) ──
      - key: DISABLE_SCHEDULER
        value: "false"

    # ── Disk (optional — for local file caching) ───────────
    # disk:
    #   name: threatpilot-cache
    #   mountPath: /var/data
    #   sizeGB: 1

# ─────────────────────────────────────────────────────────
#  NOTES FOR PRODUCTION UPGRADE
# ─────────────────────────────────────────────────────────
# 1. Upgrade from "free" to "starter" for:
#    - No sleep on inactivity (free tier sleeps after 15 min)
#    - Persistent disk support
#    - Higher RAM limits
#
# 2. For multi-region / high availability:
#    - Use "standard" plan or higher
#    - Enable "Auto-Scaling" in Render settings
#
# 3. Custom domain:
#    - Add in Render → Service → Settings → Custom Domain
#    - Render auto-provisions a free TLS certificate
#
# 4. Database:
#    - ThreatPilot uses Supabase (external) — no Render DB needed
#    - Supabase free tier: 500MB, 2 CPU, 1GB RAM
